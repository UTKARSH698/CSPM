name: CSPM Pipeline

on:
  push:
    branches: ["main"]
  pull_request:
    branches: ["main"]

jobs:
  # ── CI: lint + test ──────────────────────────────────────────────────────────
  ci:
    name: Lint & Test
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install dependencies
        run: pip install ruff pytest pytest-cov boto3 "moto[s3,iam,ec2,cloudtrail]"

      - name: Lint with ruff
        run: ruff check scanner/ remediator/ tests/

      - name: Run tests with coverage
        run: |
          pytest tests/ -v \
            --cov=scanner \
            --cov-report=term-missing \
            --cov-report=xml \
            --cov-fail-under=70

      - name: Upload coverage report
        uses: actions/upload-artifact@v4
        with:
          name: cspm-coverage
          path: coverage.xml

  # ── Infra validation (no AWS credentials required) ───────────────────────────
  # Validates the Terraform without touching a real account. A live `terraform
  # apply` would require long-lived AWS keys in repo secrets and would mutate
  # infrastructure on every push — the wrong pattern for a public repo. Deploys
  # are performed manually (see README) from a credentialed environment.
  terraform:
    name: Terraform Validate
    runs-on: ubuntu-latest
    needs: ci                          # only validate if CI passes

    defaults:
      run:
        working-directory: infrastructure

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Terraform
        uses: hashicorp/setup-terraform@v3
        with:
          terraform_version: "1.7.0"

      - name: Terraform Format Check
        run: terraform fmt -check -recursive

      - name: Terraform Init
        run: terraform init -backend=false

      - name: Terraform Validate
        run: terraform validate
